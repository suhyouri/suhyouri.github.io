  <p>무생물이 어떻게 움직이는지, 혹은 움직이는 것처럼 보이는지를 탐구하는 리서치 프로젝트입니다. 이러한 움직임이 현존과 살아있음에 대해 무엇을 의미하는지 연구합니다.</p>

  <p>생명이 없는 것들이 공간을 가로지르는 다양한 방식과 그 움직임이 갖는 철학적 함의를 탐구합니다. 우리는 생명이 없다고 알고 있는 대상의 움직임을 어떻게 지각하는가? 그들의 "걷기"는 생명에 대한 우리의 이해에 무엇을 말해주는가?</p>
